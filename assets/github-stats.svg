<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">jihkang GitHub stats</title>
  <desc id="desc">This card is refreshed by GitHub Actions from the GitHub API and committed into the repository.</desc>
  <rect width="495" height="195" rx="12" fill="#1A1B27"/>
  <rect x="1" y="1" width="493" height="193" rx="11" stroke="#2F334D"/>
  <text x="28" y="54" fill="#70A5FD" font-family="Verdana, sans-serif" font-size="24" font-weight="700">jihkang GitHub Stats</text>
  <text x="28" y="86" fill="#C3CCE3" font-family="Verdana, sans-serif" font-size="14">This SVG is stored in the repository.</text>
  <text x="28" y="110" fill="#C3CCE3" font-family="Verdana, sans-serif" font-size="14">GitHub Actions refreshes it from the GitHub API on schedule.</text>
  <text x="28" y="146" fill="#38BDAE" font-family="Verdana, sans-serif" font-size="13">Workflow: .github/workflows/refresh-github-stats.yml</text>
  <text x="28" y="168" fill="#E4BF7A" font-family="Verdana, sans-serif" font-size="13">Output: assets/github-stats.svg</text>
</svg>
