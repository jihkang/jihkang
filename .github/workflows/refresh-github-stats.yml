name: Refresh GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - codex/update-profile-readme-career
    paths:
      - "readme.md"
      - ".github/workflows/refresh-github-stats.yml"

permissions:
  contents: write

concurrency:
  group: refresh-github-stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate stats card from GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const username = "jihkang";
            const outputPath = "assets/github-stats.svg";
            const { data: user } = await github.rest.users.getByUsername({ username });
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              per_page: 100,
              type: "owner",
              sort: "updated",
            });

            const publicRepos = repos.filter((repo) => !repo.private);
            const totalStars = publicRepos.reduce((sum, repo) => sum + repo.stargazers_count, 0);
            const totalForks = publicRepos.reduce((sum, repo) => sum + repo.forks_count, 0);
            const topRepos = [...publicRepos]
              .sort((left, right) => {
                if (right.stargazers_count !== left.stargazers_count) {
                  return right.stargazers_count - left.stargazers_count;
                }
                return right.forks_count - left.forks_count;
              })
              .slice(0, 3);

            const escapeXml = (value) =>
              String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&apos;");

            const metrics = [
              ["Public Repos", user.public_repos],
              ["Followers", user.followers],
              ["Following", user.following],
              ["Total Stars", totalStars],
              ["Total Forks", totalForks],
            ];

            const metricBlocks = metrics
              .map(([label, value], index) => {
                const y = 114 + index * 20;
                return `
                  <text x="280" y="${y}" fill="#38BDAE" font-family="Verdana, sans-serif" font-size="12">${escapeXml(label)}</text>
                  <text x="392" y="${y}" text-anchor="end" fill="#C3CCE3" font-family="Verdana, sans-serif" font-size="12" font-weight="700">${escapeXml(value)}</text>
                `;
              })
              .join("");

            const repoLines = topRepos
              .map((repo, index) => {
                const y = 114 + index * 22;
                return `
                  <text x="28" y="${y}" fill="#E4BF7A" font-family="Verdana, sans-serif" font-size="12">${index + 1}. ${escapeXml(repo.name)}</text>
                  <text x="28" y="${y + 14}" fill="#C3CCE3" font-family="Verdana, sans-serif" font-size="11">${repo.stargazers_count}★ / ${repo.forks_count} forks</text>
                `;
              })
              .join("");

            const refreshedAt = new Date().toISOString().slice(0, 10);
            const svg = `<svg width="495" height="220" viewBox="0 0 495 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
              <title id="title">${escapeXml(username)} GitHub stats</title>
              <desc id="desc">GitHub profile stats generated from the GitHub API.</desc>
              <rect width="495" height="220" rx="12" fill="#1A1B27"/>
              <rect x="1" y="1" width="493" height="218" rx="11" stroke="#2F334D"/>
              <text x="28" y="44" fill="#70A5FD" font-family="Verdana, sans-serif" font-size="24" font-weight="700">${escapeXml(username)} GitHub Stats</text>
              <text x="28" y="64" fill="#C3CCE3" font-family="Verdana, sans-serif" font-size="12">Generated by GitHub Actions from the GitHub API</text>
              <text x="28" y="90" fill="#70A5FD" font-family="Verdana, sans-serif" font-size="14" font-weight="700">Top Public Repositories</text>
              <text x="280" y="90" fill="#70A5FD" font-family="Verdana, sans-serif" font-size="14" font-weight="700">Summary</text>
              <line x1="252" y1="78" x2="252" y2="184" stroke="#2F334D"/>
              ${metricBlocks}
              ${repoLines}
              <text x="28" y="202" fill="#8B949E" font-family="Verdana, sans-serif" font-size="11">Last refreshed: ${refreshedAt}</text>
            </svg>`;

            fs.mkdirSync(path.dirname(outputPath), { recursive: true });
            fs.writeFileSync(outputPath, svg);

      - name: Commit updated stats card
        run: |
          if git diff --quiet -- assets/github-stats.svg; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          git commit -m "refresh github stats card"
          git push
